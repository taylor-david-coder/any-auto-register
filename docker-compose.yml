services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_NODE_IMAGE: ${BASE_NODE_IMAGE:-node:20-bookworm-slim}
        BASE_PYTHON_IMAGE: ${BASE_PYTHON_IMAGE:-python:3.12-slim}
        DEBIAN_MIRROR: ${DEBIAN_MIRROR:-deb.debian.org}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
        PLAYWRIGHT_DOWNLOAD_HOST: ${PLAYWRIGHT_DOWNLOAD_HOST:-}
        SKIP_PLAYWRIGHT_INSTALL: ${SKIP_PLAYWRIGHT_INSTALL:-0}
        CAMOUFOX_VERSION: ${CAMOUFOX_VERSION:-135.0.1}
        CAMOUFOX_RELEASE: ${CAMOUFOX_RELEASE:-beta.24}
    container_name: any-auto-register
    init: true
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: "8000"
      APP_RELOAD: "0"
      APP_CONDA_ENV: docker
      APP_RUNTIME_DIR: /runtime
      APP_ENABLE_SOLVER: "1"
      SOLVER_PORT: "8889"
      SOLVER_BIND_HOST: 0.0.0.0
      LOCAL_SOLVER_URL: http://127.0.0.1:8889
      SOLVER_BROWSER_TYPE: ${SOLVER_BROWSER_TYPE:-camoufox}
      PLAYWRIGHT_HEADLESS: ${PLAYWRIGHT_HEADLESS:-}
    ports:
      - "8000:8000"
      - "127.0.0.1:8889:8889"
      - "${CLIPROXYAPI_PORT_BIND:-8317}:8317"
      - "${GROK2API_PORT_BIND:-8011}:8011"
    volumes:
      - ${APP_RUNTIME_BIND:-./data}:/runtime
      - ${APP_EXT_TARGETS_BIND:-./_ext_targets}:/_ext_targets
      - ${APP_EXTERNAL_LOGS_BIND:-./external_logs}:/app/services/external_logs
    shm_size: "1gb"

  gmail-bridge:
    build:
      context: .
      dockerfile: docker/gmail-bridge.Dockerfile
      args:
        BASE_PYTHON_IMAGE: ${GMAIL_BRIDGE_BASE_PYTHON_IMAGE:-python:3.12-slim}
    container_name: gmail-bridge
    restart: unless-stopped
    command: ["python", "/app/gmail_bridge.py", "--host", "0.0.0.0", "--port", "9090"]
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ${GMAIL_BRIDGE_CREDENTIALS_BIND:-./gmail-bridge/credentials.json}:/app/credentials.json:ro
      - ${GMAIL_BRIDGE_TOKEN_BIND:-./gmail-bridge/token.json}:/app/token.json

